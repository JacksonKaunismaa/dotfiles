# --- Prefix key: Ctrl+H (matching screen config) ---
unbind C-b
set -g prefix C-h
bind C-h send-prefix

# --- General settings ---
set -g mouse on
set -g set-clipboard on
set -g mode-keys vi
set-option -g history-limit 50000

# Escape without delay (important for vim)
set -g escape-time 10

# --- Window numbering: start at 1, like screen config ---
set -g base-index 1
setw -g pane-base-index 1
# Prefix+0 selects window 10 (matching screen: bind 0 select 10)
bind 0 select-window -t :10
# Renumber windows when one is closed
set-option -g renumber-windows on

# --- New window inherits current path ---
bind c new-window -c "#{pane_current_path}"

# --- Alternate screen (vim clears on exit, like altscreen on) ---
# This is on by default in tmux, but the line below (smcup/rmcup override)
# disables it to allow terminal scrollback. Pick one:
# Option A: altscreen ON (vim clears on exit, no terminal scrollback in tmux)
#   - just remove the terminal-overrides line below
# Option B: altscreen OFF (terminal scrollback works, vim leaves traces)
#   set -g terminal-overrides 'xterm*:smcup@:rmcup@'
# Matching your screen config (altscreen on), we leave it default (no override).

# --- Splits ---
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"

# --- Pane navigation: Ctrl+hjkl ---
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
# NOTE: C-h is now your prefix key, so it can't also be pane-left.
# Use prefix + Left or rebind pane-left to something else if needed.
bind Left select-pane -L

# --- Pane resizing: prefix + uiop ---
bind u resize-pane -U 5
bind p resize-pane -D 5
bind i resize-pane -L 5
bind o resize-pane -R 5

# --- Copy mode (vi style) ---
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Double click to select word
set -g word-separators ""
bind-key -n DoubleClick1Pane \
    select-pane \; \
    copy-mode -M \; \
    send-keys -X select-word \; \
    run-shell "sleep .4s" \; \
    send-keys -X copy-selection-and-cancel \;

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Shell ---
# Use zsh if available, fall back to $SHELL
if-shell "[ -x /usr/bin/zsh ]" \
    "set-option -g default-shell /usr/bin/zsh; set -g default-command /usr/bin/zsh" \
    "set-option -g default-shell ${SHELL}; set -g default-command ${SHELL}"

# --- Terminal/color settings ---
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"

# --- Status bar (matching screen hardstatus style) ---
set -g status-style "bg=black,fg=white"
set -g status-left "#[fg=white,bg=black,bold] #H #[fg=white,bg=black]| "
set -g status-left-length 30
set -g status-right "#[fg=white] %l:%M%p %Y-%m-%d "
set -g status-right-length 30
# Current window highlighted in blue (matching screen's '= kb' highlight)
setw -g window-status-current-style "fg=blue,bold"
setw -g window-status-current-format "#I:#W"
setw -g window-status-format "#I:#W"
