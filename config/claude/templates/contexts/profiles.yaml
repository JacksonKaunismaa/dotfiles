# Composable plugin profiles for claude-context
# Usage: claude-context <profile> [profiles...]
# Base plugins are always enabled; profiles add domain-specific plugins on top.
# Note: context7 is an MCP server, not a plugin — always available regardless of profile.

base:
  - core
  - code-simplifier
  - hookify
  - commit-commands
  - superpowers
  - pyright-lsp

profiles:
  code:
    comment: "Software projects"
    enable:
      - code
      - workflow

  research:
    comment: "Experiments and evals"
    enable:
      - research
      - writing
      - workflow
      - viz

  writing:
    comment: "Papers and docs"
    enable:
      - writing
      - viz
      - workflow

  full:
    comment: "Everything enabled"
    enable:
      - research
      - writing
      - code
      - workflow
      - viz
